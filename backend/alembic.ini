[alembic]
script_location = alembic
prepend_sys_path = .
# La URL real se lee de la variable de entorno DATABASE_URL en env.py.
# El valor acá abajo es SOLO un fallback de último recurso (nunca en producción).
sqlalchemy.url = postgresql+asyncpg://SET_DATABASE_URL_ENV_VAR@localhost:5432/activia_trace

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
